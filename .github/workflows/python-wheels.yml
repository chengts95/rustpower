name: Python Wheels

on:
  workflow_dispatch:

jobs:
  build_linux_wheels:
    name: Build Linux wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --no-default-features --features python,archive,klu_dyn,arrow
          sccache: 'true'
          manylinux: 2_28
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y epel-release || true
              dnf install -y suitesparse-devel clang
            elif command -v yum >/dev/null 2>&1; then
              yum install -y epel-release || true
              yum install -y suitesparse-devel clang
            fi

      - name: Inspect wheel dependencies
        run: |
          python -m pip install --upgrade auditwheel
          auditwheel show dist/*.whl || true

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/*.whl